name: challanse-local-pilot

x-backend: &backend
  build:
    context: ../../services/enrichment
    dockerfile: Dockerfile.local
  environment:
    ENVIRONMENT: ${ENVIRONMENT}
    SYNTHETIC_MODE: ${SYNTHETIC_MODE}
    DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL}
    DATABASE_URL: ${DATABASE_URL}
    SYSTEM_DATABASE_URL: ${SYSTEM_DATABASE_URL}
    DATABASE_APP_PASSWORD: ${DATABASE_APP_PASSWORD}
    DATABASE_SYSTEM_PASSWORD: ${DATABASE_SYSTEM_PASSWORD}
    TENANT_CONTEXT_HMAC_KEY: ${TENANT_CONTEXT_HMAC_KEY}
    DEVICE_TOKEN_PEPPER: ${DEVICE_TOKEN_PEPPER}
    EDGE_TO_ENRICHMENT_HMAC_KEY_ID: ${EDGE_TO_ENRICHMENT_HMAC_KEY_ID}
    EDGE_TO_ENRICHMENT_HMAC_KEY: ${EDGE_TO_ENRICHMENT_HMAC_KEY}
    RECEIPT_BUCKET: ${RECEIPT_BUCKET}
    OBJECT_STORE_ENDPOINT: ${OBJECT_STORE_ENDPOINT}
    OBJECT_STORE_ACCESS_KEY: ${OBJECT_STORE_ACCESS_KEY}
    OBJECT_STORE_SECRET_KEY: ${OBJECT_STORE_SECRET_KEY}
    OBJECT_STORE_SSE_MODE: ${OBJECT_STORE_SSE_MODE}
    EVENT_QUEUE_PROVIDER: ${EVENT_QUEUE_PROVIDER}
    OCR_PROVIDER: ${OCR_PROVIDER}
    GST_PROVIDER: disabled
    NOTIFICATION_PROVIDER: disabled
    CREDIT_PROVIDER: disabled
    SLACK_PROVIDER: disabled
    OLLAMA_URL: ${OLLAMA_URL}
    OLLAMA_MODEL: ${OLLAMA_MODEL}
    OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS}
    TESSERACT_LANGUAGES: ${TESSERACT_LANGUAGES}
    LOCAL_DATA_ROOT: ${LOCAL_DATA_ROOT}
    LOCAL_STORAGE_LIMIT_BYTES: ${LOCAL_STORAGE_LIMIT_BYTES}
    LOCAL_AUTH_ENCRYPTION_KEY: ${LOCAL_AUTH_ENCRYPTION_KEY}
    LOCAL_SESSION_TTL_MINUTES: ${LOCAL_SESSION_TTL_MINUTES:-480}
    PUBLIC_API_URL: ${PUBLIC_API_URL}
    REVIEW_DASHBOARD_URL: ${REVIEW_DASHBOARD_URL}
    PLAY_INTEGRITY_PROVIDER: disabled
  extra_hosts:
    - host.docker.internal:host-gateway
  networks: [backend, frontend]
  read_only: true
  cap_drop: [ALL]
  security_opt: [no-new-privileges:true]
  tmpfs:
    - "/tmp:rw,noexec,nosuid,size=128m"
  pids_limit: 256
  mem_limit: 1g
  cpus: 2.0
  restart: "no"

services:
  postgres:
    image: postgres:17.5@sha256:aadf2c0696f5ef357aa7a68da995137f0cf17bad0bf6e1f17de06ae5c769b302
    user: "999:999"
    environment:
      POSTGRES_DB: challanse_local
      POSTGRES_USER: challanse_admin
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD}
    volumes:
      - ${CHALLANSE_DATA_ROOT:?Set CHALLANSE_DATA_ROOT}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U challanse_admin -d challanse_local"]
      interval: 3s
      timeout: 3s
      retries: 30
    networks: [backend]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - "/var/run/postgresql:rw,nosuid,size=16m"
      - "/tmp:rw,noexec,nosuid,size=32m"
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.5
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    user: "1000:1000"
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ${CHALLANSE_DATA_ROOT}/images:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 30
    networks: [backend]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - "/tmp:rw,noexec,nosuid,size=64m"
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.5
    restart: "no"

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null;
        mc mb --ignore-existing local/challanse-receipts >/dev/null;
        mc anonymous set none local/challanse-receipts >/dev/null
    networks: [backend]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - "/tmp:rw,noexec,nosuid,size=32m"
      - "/root/.mc:rw,noexec,nosuid,size=16m"
    restart: "no"

  migrate:
    <<: *backend
    command: ["python", "-m", "app.migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    <<: *backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 3s
      timeout: 3s
      retries: 30
    volumes:
      - ${CHALLANSE_DATA_ROOT}:/srv/challanse:ro
    restart: "no"

  worker:
    <<: *backend
    command: ["python", "-m", "app.local_worker"]
    depends_on:
      api:
        condition: service_healthy
    networks: [backend, ocr-egress]
    volumes:
      - ${CHALLANSE_DATA_ROOT}:/srv/challanse:ro
    restart: "no"

  edge:
    build:
      context: ../..
      dockerfile: deploy/local/Dockerfile.web
    working_dir: /app/apps/edge
    command: ["npx", "wrangler", "dev", "--local", "--ip", "0.0.0.0", "--port", "8787"]
    volumes:
      - ${CHALLANSE_RUNTIME_ROOT:?Set CHALLANSE_RUNTIME_ROOT}/edge.dev.vars:/app/apps/edge/.dev.vars:ro
    depends_on:
      api:
        condition: service_healthy
    networks: [frontend]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - "/tmp:rw,noexec,nosuid,size=128m"
      - "/app/apps/edge/.wrangler:rw,noexec,nosuid,uid=1000,gid=1000,mode=0700,size=64m"
    pids_limit: 256
    mem_limit: 768m
    cpus: 1.0
    restart: "no"

  reviewer-worker:
    build:
      context: ../..
      dockerfile: deploy/local/Dockerfile.web
    working_dir: /app/apps/reviewer
    command: ["npx", "wrangler", "dev", "--local", "--ip", "0.0.0.0", "--port", "8788"]
    volumes:
      - ${CHALLANSE_RUNTIME_ROOT}/reviewer.dev.vars:/app/apps/reviewer/.dev.vars:ro
    depends_on: [edge]
    networks: [frontend]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - "/tmp:rw,noexec,nosuid,size=128m"
      - "/app/apps/reviewer/.wrangler:rw,noexec,nosuid,uid=1000,gid=1000,mode=0700,size=64m"
    pids_limit: 256
    mem_limit: 512m
    cpus: 0.75
    restart: "no"

  gateway:
    build:
      context: ../..
      dockerfile: deploy/local/Dockerfile.caddy
    environment:
      CHALLANSE_LAN_IP: ${CHALLANSE_LAN_IP:?Set CHALLANSE_LAN_IP}
      LOCAL_REVIEWER_GATEWAY_SECRET: ${LOCAL_REVIEWER_GATEWAY_SECRET}
    ports:
      - ${CHALLANSE_LAN_IP}:8443:8443
      - ${CHALLANSE_LAN_IP}:8444:8444
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CHALLANSE_RUNTIME_ROOT}/tls:/etc/challanse-tls:ro
      - ../../apps/reviewer/dist:/srv/reviewer:ro
    depends_on: [edge]
    networks: [frontend, lan-publish]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - "/data:rw,noexec,nosuid,uid=1000,gid=1000,mode=0700,size=32m"
      - "/config:rw,noexec,nosuid,uid=1000,gid=1000,mode=0700,size=16m"
      - "/tmp:rw,noexec,nosuid,uid=1000,gid=1000,mode=0700,size=16m"
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    restart: "no"

  cloudflared:
    image: cloudflare/cloudflared:2026.7.0@sha256:5e49861633763e8933475477c20bae6039ed47f32c1d267a34babc347f28f0df
    profiles: [remote]
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    command: ["tunnel", "--no-autoupdate", "run"]
    depends_on: [edge, reviewer-worker]
    networks: [frontend, tunnel-egress]
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs:
      - "/tmp:rw,noexec,nosuid,size=32m"
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    restart: "no"

networks:
  backend:
    internal: true
  frontend:
    internal: true
  ocr-egress:
    internal: true
  tunnel-egress:
    internal: false
  lan-publish:
    internal: false
