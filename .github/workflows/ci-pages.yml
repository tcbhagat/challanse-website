name: ChallanSe CI and deployment

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: challanse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - run: bash scripts/test-edge-integration.sh
      - run: bash scripts/test-production-config.sh
      - name: Run landing Lighthouse gate
        run: |
          python3 -m http.server 4173 --directory dist/landing > /tmp/challanse-http.log 2>&1 &
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:4173/ > /dev/null && break
            sleep 1
          done
          npm run audit

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - run: npm ci
      - run: npm run check --workspace @challanse/mobile
      - run: npm test --workspace @challanse/mobile
      - run: npm run build --workspace @challanse/mobile

  deploy-landing:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.PILOT_DEPLOY_ENABLED == 'true'
    needs: [validate, android]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: production
      url: https://challanse.constrovet.com
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build:landing
        env:
          CHALLANSE_API_BASE_URL: https://api.challanse.constrovet.com
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          CHALLANSE_CUSTOM_DOMAIN: challanse.constrovet.com
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/landing
      - id: deployment
        uses: actions/deploy-pages@v5

  deploy-cloudflare:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.PILOT_DEPLOY_ENABLED == 'true'
    needs: [validate, android]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/render-edge-config.mjs
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_ACCESS_TEAM_DOMAIN: ${{ vars.CLOUDFLARE_ACCESS_TEAM_DOMAIN }}
          CLOUDFLARE_ACCESS_AUD: ${{ vars.CLOUDFLARE_ACCESS_AUD }}
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply challanse-pilot --remote --config apps/edge/wrangler.generated.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Configure Worker secrets
        run: |
          printf '%s' "$DEVICE_TOKEN_PEPPER" | npx wrangler secret put DEVICE_TOKEN_PEPPER --config apps/edge/wrangler.generated.toml
          printf '%s' "$TURNSTILE_SECRET" | npx wrangler secret put TURNSTILE_SECRET --config apps/edge/wrangler.generated.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEVICE_TOKEN_PEPPER: ${{ secrets.DEVICE_TOKEN_PEPPER }}
          TURNSTILE_SECRET: ${{ secrets.TURNSTILE_SECRET }}
      - name: Deploy API
        run: npx wrangler deploy --config apps/edge/wrangler.generated.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Build reviewer
        run: npm run build --workspace @challanse/reviewer
        env:
          VITE_API_BASE_URL: /api
          VITE_PUBLIC_API_URL: https://api.challanse.constrovet.com
      - name: Deploy reviewer
        run: npx wrangler deploy --config apps/reviewer/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release-android:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.PILOT_DEPLOY_ENABLED == 'true'
    needs: [validate, android]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - run: npm ci
      - name: Restore release keystore
        run: echo "$CHALLANSE_KEYSTORE_BASE64" | base64 --decode > apps/mobile/android/challanse-release.jks
        env:
          CHALLANSE_KEYSTORE_BASE64: ${{ secrets.CHALLANSE_KEYSTORE_BASE64 }}
      - run: npm run build:release --workspace @challanse/mobile
        env:
          CHALLANSE_KEYSTORE_FILE: ../challanse-release.jks
          CHALLANSE_KEYSTORE_PASSWORD: ${{ secrets.CHALLANSE_KEYSTORE_PASSWORD }}
          CHALLANSE_KEY_ALIAS: ${{ secrets.CHALLANSE_KEY_ALIAS }}
          CHALLANSE_KEY_PASSWORD: ${{ secrets.CHALLANSE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v7
        with:
          name: challanse-android-release
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
